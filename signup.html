<!DOCTYPE html>
<html>
<head>
    <title>Facebook – Create New Account</title>
    <link rel="stylesheet" href="./signup.css">
    <link rel="icon" type="image/png" href="./INDEX/assets/android-chrome-512x512.png">

</head>
<body>

<div class="logo"><a href="./index.html">facebook</a></div>

<div class="signupcard">
    <h2>Create a new account</h2>
    <p class="title">It's quick and easy.</p>

    <hr>

    <form>
        <div class="row">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Surname">
        </div>

        <label>Date of birth</label>
        <div class="dob">
            <select>
                <option>30</option>
            </select>
            <select>
                <option>Jan</option>
            </select>
            <select>
                <option>2026</option>
            </select>
        </div>

        <label>Gender</label>
        <div class="gender">
            <label class="genderbox">
                Female
                <input type="radio" name="gender">
            </label>
            <label class="genderbox">
                Male
                <input type="radio" name="gender">
            </label>
            <label class="genderbox">
                Custom
                <input type="radio" name="gender">
            </label>
        </div>

        <input class="full" type="text" placeholder="Mobile number or email address">
        <input class="full" type="password" placeholder="New password">

        <p class="text">
            People who use our service may have uploaded your contact information to Facebook.
            <a href="#">Learn more</a>.
        </p>

        <p class="text">
            By clicking Sign Up, you agree to our
            <a href="#">Terms</a>,
            <a href="#">Privacy Policy</a> and
            <a href="#">Cookies Policy</a>.
        </p>

       <button><a href="./index.html">Sign up</a></button>
   
    </form>
</div>

</body>
</html>
